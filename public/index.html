<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文言練習</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://my.bdfz.net/site-auth.js" defer></script>
    <script type="module" src="/app.js" defer></script>
  </head>
  <body>
    <div class="page-glow page-glow-a"></div>
    <div class="page-glow page-glow-b"></div>
    <main class="shell">
      <header class="topbar">
        <div class="entry-strip">
          <button class="entry-tile" data-kind="content_word" type="button">實詞</button>
          <button class="entry-tile" data-kind="function_word" type="button">虛詞</button>
        </div>

        <label class="theme-picker" for="theme-select">
          <span>配色</span>
          <select id="theme-select">
            <option value="parchment">宣紙</option>
            <option value="forest">松墨</option>
            <option value="ink">夜硯</option>
          </select>
        </label>
      </header>

      <section class="arena-grid">
        <article class="battle-stage">
          <header class="stage-head">
            <div class="rank-badge" id="rank-badge">
              <span class="rank-kicker" id="rank-kicker">未開局</span>
              <strong id="rank-name">工蜂</strong>
              <em id="rank-mode">常規排位</em>
            </div>
            <div class="stage-meta">
              <div class="meta-chip">
                <span class="meta-label">本輪</span>
                <strong id="round-fraction">0 / 10</strong>
              </div>
              <div class="meta-chip">
                <span class="meta-label">全對晉級</span>
                <strong id="round-goal">10 / 10</strong>
              </div>
            </div>
          </header>

          <section class="question-root" id="question-root">
            <div class="empty-state">
              <p>選擇實詞或虛詞後直接進題。</p>
            </div>
          </section>

          <div class="round-track" id="round-track" aria-label="本輪作答進度"></div>
        </article>

        <aside class="side-panel">
          <section class="leaderboard-panel">
            <header class="panel-head">
              <p>榜單</p>
              <span id="leaderboard-kind">實詞</span>
            </header>
            <div class="leaderboard-root" id="leaderboard-root"></div>
          </section>
        </aside>
      </section>
    </main>

    <div class="feedback-modal" id="feedback-modal" hidden>
      <div class="feedback-dialog">
        <div class="feedback-dialog-head">
          <div>
            <strong>題目問題反饋</strong>
            <p id="feedback-prompt-meta">把這道題的問題直接提交到 GitHub。</p>
          </div>
          <button id="feedback-close" class="feedback-close" type="button" aria-label="關閉">×</button>
        </div>
        <form id="feedback-form" class="feedback-form">
          <label class="feedback-field feedback-anon-row">
            <span>匿名提交</span>
            <input id="feedback-anonymous" name="anonymous" type="checkbox" />
          </label>
          <label class="feedback-field">
            <span>顯示名稱</span>
            <input id="feedback-name" name="reporterName" type="text" maxlength="80" placeholder="匿名" />
          </label>
          <label class="feedback-field">
            <span>這道題有什麼問題？</span>
            <textarea
              id="feedback-message"
              name="message"
              rows="6"
              maxlength="4000"
              placeholder="例如：正確答案有誤、選項不成立、出處不對、解析有無關內容、考察詞不在題幹內。"
              required
            ></textarea>
          </label>
          <label class="feedback-field">
            <span>截圖上傳</span>
            <input id="feedback-screenshot" name="screenshot" type="file" accept="image/*" />
            <em>支持 PNG / JPG / WebP / GIF，單張不超過 8 MB。</em>
          </label>
          <p class="feedback-status" id="feedback-status" aria-live="polite"></p>
          <div class="feedback-actions">
            <button id="feedback-cancel" class="ghost-btn" type="button">取消</button>
            <button id="feedback-submit" class="next-round-btn" type="submit">提交到 GitHub</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
