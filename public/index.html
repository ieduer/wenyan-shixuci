<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文言實虛詞</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://my.bdfz.net/site-auth.js" defer></script>
    <script type="module" src="/app.js" defer></script>
  </head>
  <body>
    <div class="page-aura page-aura-a"></div>
    <div class="page-aura page-aura-b"></div>
    <main class="shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="brand-kicker">北京高考文言對戰場</p>
          <h1>文言實虛詞</h1>
        </div>
        <div class="top-controls">
          <div class="segmented-control" aria-label="挑戰模式">
            <button class="mode-chip active" data-mode="warmup" type="button">熱身</button>
            <button class="mode-chip" data-mode="ranked" type="button">排位</button>
            <button class="mode-chip" data-mode="review" type="button">追擊</button>
          </div>
          <div class="theme-switch" aria-label="配色主題">
            <button class="theme-chip active" data-theme="parchment" type="button">宣紙</button>
            <button class="theme-chip" data-theme="forest" type="button">松墨</button>
            <button class="theme-chip" data-theme="ink" type="button">夜硯</button>
          </div>
        </div>
      </header>

      <section class="entry-strip">
        <button class="entry-tile" data-kind="function_word" type="button">
          <span class="entry-mark">虛詞</span>
          <strong>虛詞</strong>
          <p>辨義 · 辨用</p>
        </button>
        <button class="entry-tile" data-kind="content_word" type="button">
          <span class="entry-mark">實詞</span>
          <strong>實詞</strong>
          <p>定義 · 句意 · 文意</p>
        </button>
      </section>

      <section class="arena-grid">
        <article class="battle-stage">
          <header class="stage-head">
            <div class="stage-copy">
              <p class="stage-kicker" id="stage-kicker">熱身</p>
              <h2 id="stage-title">選擇實詞或虛詞開始</h2>
            </div>
            <div class="stage-score">
              <span id="score-label">0 分</span>
              <div class="score-track">
                <div class="score-fill" id="score-fill"></div>
              </div>
            </div>
          </header>

          <div class="stage-body" id="question-root">
            <div class="empty-state">
              <p>選一種詞類，直接進場。</p>
            </div>
          </div>

          <div class="stage-note" id="stage-note" hidden></div>

          <footer class="stage-actions">
            <button id="submit-answer" class="primary-btn" type="button" disabled>提交答案</button>
            <button id="next-question" class="ghost-btn" type="button" disabled>下一題</button>
          </footer>
        </article>

        <aside class="arena-side">
          <section class="status-panel">
            <div class="panel-head">
              <p class="panel-label">戰況</p>
              <div class="badge-strip" id="badge-strip"></div>
            </div>

            <div class="rank-card">
              <div class="rank-summary">
                <span class="rank-caption">階位</span>
                <strong id="rank-name">未開局</strong>
              </div>
              <div class="combo-card">
                <span>連勝</span>
                <strong id="streak-count">0</strong>
              </div>
            </div>

            <div class="meter-list">
              <div class="meter-row">
                <div class="meter-meta">
                  <span>已答</span>
                  <strong id="answered-count">0</strong>
                </div>
                <div class="meter-track"><div class="meter-fill meter-fill-a" id="answered-fill"></div></div>
              </div>
              <div class="meter-row">
                <div class="meter-meta">
                  <span>答對</span>
                  <strong id="correct-count">0</strong>
                </div>
                <div class="meter-track"><div class="meter-fill meter-fill-b" id="correct-fill"></div></div>
              </div>
              <div class="meter-row">
                <div class="meter-meta">
                  <span>追擊</span>
                  <strong id="review-count">0</strong>
                </div>
                <div class="meter-track"><div class="meter-fill meter-fill-c" id="review-fill"></div></div>
              </div>
            </div>
          </section>

          <section class="leaderboard-panel">
            <div class="panel-head">
              <p class="panel-label">對戰榜</p>
              <span class="panel-subtle">今日</span>
            </div>
            <div class="leaderboard-root" id="leaderboard-root"></div>
          </section>
        </aside>
      </section>
    </main>
  </body>
</html>
